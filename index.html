<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI图像分类器 - 423240629 曾成焰</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .student-info {
            background: #e9ecef;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .student-info p {
            margin: 5px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .upload-area {
            margin: 20px 0;
        }
        #imageUpload {
            margin-right: 10px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin: 20px 0;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
        }
        #preview {
            max-width: 100%;
            max-height: 300px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .status {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>AI 图像分类器</h1>
        <div class="student-info">
            <p>学号：423240629</p>
            <p>姓名：曾成焰</p>
        </div>
        <div class="upload-area">
            <input type="file" id="imageUpload" accept="image/*">
            <button id="classifyBtn" disabled>开始分类</button>
        </div>
        <div class="result">
            <h3>分类结果：</h3>
            <p id="resultText">等待上传图片...</p>
        </div>
        <div class="image-preview">
            <img id="preview" src="" alt="图片预览">
        </div>
        <div class="status" id="status"></div>
    </div>

    <script>
        // 等待 DOM 加载完成
        document.addEventListener('DOMContentLoaded', () => {
            const imageUpload = document.getElementById('imageUpload');
            const classifyBtn = document.getElementById('classifyBtn');
            const resultText = document.getElementById('resultText');
            const previewImg = document.getElementById('preview');
            const statusDiv = document.getElementById('status');

            let model = null;
            let modelLoaded = false;

            // 加载 ImageNet 标签
            let imagenetClasses = [];
            async function loadLabels() {
                try {
                    const response = await fetch('https://storage.googleapis.com/download.tensorflow.org/data/ImageNetLabels.txt');
                    const text = await response.text();
                    imagenetClasses = text.split('\n').filter(line => line.trim() !== '');
                    // 第一个是背景类，通常去掉
                    imagenetClasses = imagenetClasses.slice(1);
                    console.log('标签加载完成，共', imagenetClasses.length);
                } catch (err) {
                    console.error('加载标签失败', err);
                }
            }

            // 加载 MobileNet 模型
            async function loadModel() {
                statusDiv.textContent = '正在加载 MobileNet 模型（约 5MB），请稍候...';
                try {
                    await tf.ready();
                    // 使用 Google Cloud 托管的 MobileNet v2 模型（用于 TensorFlow.js）
                    const modelUrl = 'https://storage.googleapis.com/tfjs-models/tfjs/mobilenet_v2_1.0_224/model.json';
                    model = await tf.loadLayersModel(modelUrl);
                    modelLoaded = true;
                    await loadLabels(); // 加载分类标签
                    statusDiv.textContent = '模型加载完成，可以上传图片进行分类！';
                    classifyBtn.disabled = false;
                } catch (err) {
                    statusDiv.textContent = '模型加载失败，请刷新页面重试。错误：' + err.message;
                    console.error(err);
                    classifyBtn.disabled = true;
                }
            }

            // 预处理图片并推理
            async function classifyImage(imageElement) {
                if (!modelLoaded) {
                    resultText.textContent = '模型尚未加载完成，请稍后再试。';
                    return;
                }
                resultText.textContent = '正在分类，请稍候...';
                try {
                    // 将图片转换为 tensor，并调整大小到 224x224，归一化到 [0,1]
                    const tensor = tf.browser.fromPixels(imageElement)
                        .resizeNearestNeighbor([224, 224])
                        .toFloat()
                        .div(tf.scalar(255))
                        .expandDims(0);
                    
                    const predictions = await model.predict(tensor).data();
                    // 获取前 3 个预测结果
                    const topK = 3;
                    const values = Array.from(predictions);
                    const indices = values.map((v, i) => i);
                    indices.sort((a, b) => values[b] - values[a]);
                    const topIndices = indices.slice(0, topK);
                    const results = topIndices.map(i => ({
                        className: imagenetClasses[i] || `类别 ${i}`,
                        probability: values[i]
                    }));
                    
                    const formatted = results.map(r => `${r.className}：${(r.probability * 100).toFixed(2)}%`).join('；');
                    resultText.textContent = formatted;
                    
                    // 清理 tensor 以释放内存
                    tensor.dispose();
                } catch (err) {
                    resultText.textContent = '分类出错：' + err.message;
                    console.error(err);
                }
            }

            function loadImageFromFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => resolve(img);
                        img.onerror = reject;
                        img.src = e.target.result;
                        previewImg.src = e.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            classifyBtn.addEventListener('click', async () => {
                const file = imageUpload.files[0];
                if (!file) {
                    resultText.textContent = '请先选择一张图片。';
                    return;
                }
                try {
                    const img = await loadImageFromFile(file);
                    await classifyImage(img);
                } catch (err) {
                    resultText.textContent = '图片加载失败，请重试。';
                    console.error(err);
                }
            });

            // 开始加载模型和标签
            loadModel();
        });
    </script>
</body>
</html>
