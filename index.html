<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI语音识别器 - 423240629 曾成焰</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .student-info {
            background: #e9ecef;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .student-info p {
            margin: 5px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .control-area {
            margin: 20px 0;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            margin: 0 10px;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result {
            margin: 20px 0;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            min-height: 100px;
            text-align: left;
        }
        .result p {
            margin: 5px 0;
            word-break: break-all;
        }
        .status {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 语音识别器</h1>
        <div class="student-info">
            <p>学号：423240629</p>
            <p>姓名：曾成焰</p>
        </div>
        <div class="control-area">
            <button id="startBtn" disabled>🎤 开始识别</button>
            <button id="stopBtn" disabled>⏹️ 停止识别</button>
        </div>
        <div class="result">
            <h3>识别结果：</h3>
            <p id="interimText">（临时结果）</p>
            <p id="finalText">（最终结果）</p>
        </div>
        <div class="status" id="status">正在初始化语音识别...</div>
    </div>

    <script>
        // 检查浏览器是否支持 Web Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            document.getElementById('status').textContent = '错误：您的浏览器不支持语音识别，请使用 Chrome、Edge 或 Safari 等现代浏览器。';
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = true;
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';          // 中文
            recognition.interimResults = true;    // 显示临时结果
            recognition.maxAlternatives = 1;

            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const interimText = document.getElementById('interimText');
            const finalText = document.getElementById('finalText');
            const statusDiv = document.getElementById('status');

            let isListening = false;

            recognition.onstart = () => {
                isListening = true;
                statusDiv.textContent = '正在聆听，请说话...';
                startBtn.disabled = true;
                stopBtn.disabled = false;
                interimText.textContent = '（临时结果）';
                finalText.textContent = '（最终结果）';
            };

            recognition.onend = () => {
                isListening = false;
                statusDiv.textContent = '识别已停止，可点击开始按钮重新识别。';
                startBtn.disabled = false;
                stopBtn.disabled = true;
            };

            recognition.onresult = (event) => {
                let interim = '';
                let final = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        final += transcript;
                    } else {
                        interim += transcript;
                    }
                }
                interimText.textContent = interim || '（等待说话...）';
                if (final) {
                    finalText.textContent = final;
                }
            };

            recognition.onerror = (event) => {
                console.error('语音识别错误:', event.error);
                let msg = '';
                switch (event.error) {
                    case 'not-allowed':
                        msg = '未获得麦克风权限，请允许麦克风后重试。';
                        break;
                    case 'no-speech':
                        msg = '未检测到语音，请重试。';
                        break;
                    default:
                        msg = '识别出错：' + event.error;
                }
                statusDiv.textContent = msg;
                recognition.stop();
            };

            startBtn.addEventListener('click', () => {
                try {
                    recognition.start();
                } catch (e) {
                    statusDiv.textContent = '启动失败：' + e.message;
                }
            });

            stopBtn.addEventListener('click', () => {
                recognition.stop();
            });

            // 检查麦克风权限（可选）
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => {
                    statusDiv.textContent = '语音识别已就绪，点击“开始识别”并说话。';
                    startBtn.disabled = false;
                })
                .catch((err) => {
                    statusDiv.textContent = '无法获取麦克风权限，请检查浏览器设置。错误：' + err.message;
                    startBtn.disabled = true;
                    stopBtn.disabled = true;
                });
        }
    </script>
</body>
</html>
